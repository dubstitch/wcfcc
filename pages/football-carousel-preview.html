<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Carousel Preview | WCFCC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/site.css">
<style>
  .football-progress-section { background: var(--black); padding: 80px 0; overflow: hidden; }
  .football-progress-section .section-eyebrow { color: rgba(255,255,255,0.4); }
  .football-progress-section .section-title { color: var(--white); }
  .football-progress-carousel { display: flex; align-items: stretch; gap: 20px; transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94); }
  .football-progress-card { background: rgba(255,255,255,0.04); border-radius: 16px; padding: 28px; border: 1px solid rgba(255,255,255,0.08); flex: 0 0 calc(33.333% - 14px); }
  .football-progress-card.is-active { border: 2px solid var(--yellow); box-shadow: 0 0 0 2px rgba(232,255,0,0.2); }
</style>
</head>
<body>
<section class="football-progress-section">
  <div class="container">
    <div class="experience-carousel-wrapper" style="margin-top:48px;">
      <div class="football-progress-carousel" id="footballProgression">
        <div class="football-progress-card"><div class="football-progress-num">1</div><h3>FOUNDATION &amp; EVALUATION</h3></div>
        <div class="football-progress-card"><div class="football-progress-num">2</div><h3>POSITION DEVELOPMENT</h3></div>
        <div class="football-progress-card"><div class="football-progress-num">3</div><h3>CONDITIONING</h3></div>
        <div class="football-progress-card"><div class="football-progress-num">4</div><h3>TEAM COORDINATION</h3></div>
        <div class="football-progress-card"><div class="football-progress-num">5</div><h3>GAME SITUATIONS</h3></div>
        <div class="football-progress-card"><div class="football-progress-num">6</div><h3>CHAMPIONSHIP DAY</h3></div>
      </div>
    </div>
  </div>
</section>
<script src="../js/reusable-carousel.js"></script>
<script>
  initReusableCarousel({ carouselId: 'footballProgression', prevId: 'footballPrev', nextId: 'footballNext', dotsId: 'footballDots', cardSelector: '.football-progress-card', desktopVisible: 3, gap: 20 });
</script>
</body>
</html>
